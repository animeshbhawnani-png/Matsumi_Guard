# Fly.io Configuration
# Deploy with: flyctl launch

app = "cardano-risk-engine"

[build]
  builder = "heroku"

[env]
  PORT = "8000"

[[services]]
  protocol = "tcp"
  internal_port = 8000
  external_port = 80

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "10s"
    grace_period = "10s"

[checks]
  [checks.alive]
    type = "http"
    interval = "10s"
    timeout = "5s"
    grace_period = "5s"
    method = "get"
    path = "/health"
